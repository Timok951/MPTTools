<div class="form-field {% if field.errors %}has-error{% endif %} {% if full_width %}full{% endif %} {% if field.field.widget.input_type == 'checkbox' %}checkbox-field{% endif %}">
    {% if field.field.widget.input_type == "checkbox" %}
        <label for="{{ field.id_for_label }}" class="checkbox-control">
            {{ field }}
            <span>{{ field.label }}</span>
        </label>
    {% else %}
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
    {% endif %}
    {% if field.help_text %}
        <div class="field-help">{{ field.help_text }}</div>
    {% endif %}
    {% for error in field.errors %}
        <div class="field-error">{{ error }}</div>
    {% endfor %}
</div>
