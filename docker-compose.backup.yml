services:
  backup:
    image: postgres:17
    container_name: mpttools-backup
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-host.docker.internal}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-mpttools}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      BACKUP_DIR: /backups
      BACKUP_KEEP_COUNT: ${BACKUP_KEEP_COUNT:-14}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 2 * * *}
      BACKUP_LABEL: ${BACKUP_LABEL:-docker}
    volumes:
      - ./backups/postgresql:/backups
      - ./docker/backup/backup-cron.sh:/usr/local/bin/backup-cron.sh:ro
      - ./docker/backup/docker-entrypoint.sh:/usr/local/bin/docker-backup-entrypoint.sh:ro
    command: >
      bash -lc "
      apt-get update &&
      apt-get install -y --no-install-recommends cron bash &&
      rm -rf /var/lib/apt/lists/* &&
      bash /usr/local/bin/docker-backup-entrypoint.sh
      "
