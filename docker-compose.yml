# Два стека на одной машине: разные каталоги + свой .env (см. env.docker.example — блок «Стек 2»).
# Во втором .env задайте: COMPOSE_PROJECT_NAME=mpt_tools_b и свободные MPTTOOLS_* порты.
#
# Postgres по умолчанию только внутри Docker (без конфликта порта 5433). С хоста:
#   docker compose exec postgres_db psql -U postgres -d mpt_tools
# Нужен доступ с хоста к порту БД:
#   docker compose -f docker-compose.yml -f docker-compose.postgres-host.yml up -d

# Имя Docker-проекта (тома/сеть): задайте в .env COMPOSE_PROJECT_NAME для второго клона.
name: ${COMPOSE_PROJECT_NAME:-mpt_tools}

services:
  djangoapp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app/TIP
    environment:
      DATABASE_ENGINE: postgresql
      DATABASE_HOST: postgres_db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-mpt_tools}
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1,web,djangoapp,*}"
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:18080,http://127.0.0.1:18080}
      DEBUG: ${DEBUG:-true}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-mailpit}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@mpt-tools.local}
      RUN_TESTS_ON_START: ${RUN_TESTS_ON_START:-true}
      TEST_SUITE_ON_START: ${TEST_SUITE_ON_START:-inventory.tests}
    ports:
      - "${MPTTOOLS_WEB_PORT:-18080}:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - django_monitoring
    entrypoint: ["bash", "/app/entrypoint.sh"]

  postgres_db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mpt_tools}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-mpt_tools}"]
      interval: 3s
      timeout: 5s
      retries: 20
    networks:
      - django_monitoring

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    # Высокие порты на хосте — реже пересекаются со вторым Mailpit/приложением на 1025/8025.
    ports:
      - "${MPTTOOLS_SMTP_PORT:-10225}:1025"
      - "${MPTTOOLS_MAILPIT_UI_PORT:-18025}:8025"
    networks:
      - django_monitoring

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "${MPTTOOLS_PROMETHEUS_PORT:-19176}:9090"
    volumes:
      - prometheus_tsdb:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      djangoapp:
        condition: service_started
      postgres_exporter:
        condition: service_started
    networks:
      - django_monitoring

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres_db:5432/${POSTGRES_DB:-mpt_tools}?sslmode=disable
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - django_monitoring

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "${MPTTOOLS_GRAFANA_PORT:-13816}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:13816}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - django_monitoring

  backup:
    image: postgres:17
    restart: unless-stopped
    environment:
      DATABASE_HOST: postgres_db
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-mpt_tools}
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BACKUP_DIR: /backups
      BACKUP_KEEP_COUNT: ${BACKUP_KEEP_COUNT:-14}
      BACKUP_LABEL: ${BACKUP_LABEL:-docker}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backups/postgresql:/backups
      - ./docker/backup/backup-cron.sh:/scripts/backup-cron.sh:ro
      - ./docker/backup/backup-loop.sh:/scripts/backup-loop.sh:ro
    command: ["bash", "/scripts/backup-loop.sh"]
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - django_monitoring

volumes:
  postgres_data:
  prometheus_tsdb:
  grafana_data:

networks:
  django_monitoring:
    driver: bridge
