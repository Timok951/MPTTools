services:
  djangoapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpttools_web
    volumes:
      - .:/app
    working_dir: /app/TIP
    environment:
      DATABASE_ENGINE: postgresql
      DATABASE_HOST: postgres_db
      DATABASE_PORT: "5432"
      DATABASE_NAME: mpttools
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      DEBUG: ${DEBUG:-true}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-mailhog}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-false}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@mpttools.local}
    ports:
      - "8000:8000"
    depends_on:
      postgres_db:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - django_monitoring
    entrypoint: ["/app/entrypoint.sh"]

  postgres_db:
    image: postgres:17
    container_name: mpttools_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mpttools
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mpttools"]
      interval: 3s
      timeout: 5s
      retries: 20
    networks:
      - django_monitoring

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mpttools_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - django_monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: mpttools_prometheus
    ports:
      - "9176:9090"
    volumes:
      - prometheus_tsdb:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - django_monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: mpttools_grafana
    ports:
      - "3816:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - django_monitoring

  backup:
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    container_name: mpttools_backup
    restart: unless-stopped
    environment:
      DATABASE_HOST: postgres_db
      DATABASE_PORT: "5432"
      DATABASE_NAME: mpttools
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BACKUP_DIR: /backups
      BACKUP_KEEP_COUNT: ${BACKUP_KEEP_COUNT:-14}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 2 * * *}
      BACKUP_LABEL: docker
    volumes:
      - ./backups/postgresql:/backups
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - django_monitoring

volumes:
  postgres_data:
  prometheus_tsdb:
  grafana_data:

networks:
  django_monitoring:
    driver: bridge
